<!doctype html>
<html lang='en'>

<head>
	<meta charset='utf-8'>
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<title>Layout sandbox</title>

	<style>
		/* Least-boilerplate sandbox for the shell switchboard. No framework, no
		   build - native <popover>, CSS, fake content. Grow the switchboard here,
		   then port into the real shell. */

		* {
			box-sizing: border-box;
		}

		/* Shell measures as variables, so any threshold (grid's "does the panel
		   fit in the right space") is calculable from these, never a magic number. */
		:root {
			--content-max: 720px;
			--rail-width: 300px;

			/* the settings panel has known content, so it earns a min width */
			--panel-min: 280px;

			/* grid-mode wall geometry - matched to the real page (grid-view.css):
			   wall-column is the designed lane measure (cards never exceed it),
			   wall-gap the gutter; the wall's max derives from them. */
			--grid-columns: 2;
			--wall-column: 36rem;
			--wall-gap: 4rem;
			--wall-inset: 4vw;
			--wall-max: calc(var(--grid-columns) * var(--wall-column) + (var(--grid-columns) - 1) * var(--wall-gap));

			/* the reveal-on-orphan island's footprint - the wall reserves this much
			   on the right so the buttons are never crowded out (sized to the actual
			   button, not a glyph). */
			--island-width: 6rem;
			--island-reserve: calc(var(--island-width) + 2rem);

			/* the intro reads a little bigger than a grid item - prominence. */
			--intro-width: calc(var(--wall-column) * 1.2);
		}

		body {
			margin: 0;
			font-family: system-ui, sans-serif;
			line-height: 1.5;
		}

		/* ---- shell ---- */
		.page-wrapper {
			display: flex;
			flex-direction: column;
			min-height: 100dvh;
		}

		/* the chrome - site nav. Holds the trigger(s). */
		.shell-nav {
			position: sticky;
			top: 0;

			display: flex;
			justify-content: flex-end;
			gap: 0.5rem;

			padding: 0.75rem 1rem;

			/* region tint (debug) */
			background: #fbf6e6;
		}

		/* the toolbox - the stable trigger CLUSTER. Holds N triggers, placed
		   right. The panel anchors to this, so both/all triggers share one edge. */
		.toolbox {
			display: flex;
			gap: 0.5rem;

			anchor-name: --toolbox;
		}

		/* Grid invite appears ONLY at the grid threshold (there's room for the wall).
		   Room-gated, pure CSS. NOTE: @media conditions can't read custom properties,
		   so the threshold is a literal here even though the shell measures are
		   variables - a real platform limit, not an oversight. */
		.grid-invite {
			display: none;
		}

		@media (width >= 1200px) {
			.grid-invite {
				display: inline-flex;
			}
		}

		main {
			padding: 1rem;

			/* region tint (debug) */
			background: #eef3fb;
		}

		.page-header {
			/* region tint (debug) */
			background: #f3ecfb;
		}

		.shell-footer {
			/* region tint (debug) */
			background: #eaf6ee;
		}

		/* SIGNAL 1: Room. Narrow = the shell-nav is a sticky top bar (above).
		   Wide = the wrapper becomes two columns and the SAME <header> is placed
		   into a persistent side rail. No DOM move - CSS grid does the placing. */
		@media (width >= 1024px) {
			.page-wrapper {
				display: grid;

				/* Flexible gutters so the group breathes as it grows, held
				   off-center to the LEFT: the right gutter (1.5fr) is bigger than
				   the left (1fr), so the extra width favors the right - the space
				   the exhibit / menu-revival lives in later. Each gutter keeps a min
				   so it never fully collapses. Content caps at a readable measure;
				   rail stays fixed. */
				grid-template-columns:
					minmax(1rem, 1fr)
					minmax(0, var(--content-max))
					var(--rail-width)
					minmax(1rem, 1.5fr);
				grid-template-rows: 1fr auto;
				column-gap: 1.5rem;
			}

			main {
				grid-column: 2;
				grid-row: 1;
			}

			.shell-footer {
				grid-column: 2;
				grid-row: 2;
			}

			.shell-nav {
				grid-column: 3;
				grid-row: 1 / -1;

				/* only as tall as the toolbox when closed - the rail stays
				   unoccupied until the panel opens. */
				align-self: start;

				/* a side column now: stack the toolbox + panel vertically, contents
				   pulled RIGHT so the toolbox hugs the right edge. */
				flex-direction: column;
				align-items: flex-end;
				gap: 0.75rem;
				justify-content: flex-start;
			}

			/* When open here, the panel matches the rail COLUMN width: fill up to
			   the column measure. One variable (--rail-width) sets both, so they
			   can't drift. (Anchoring below/right of the toolbox comes from base.) */
			.panel {
				width: 100%;
				max-width: var(--rail-width);
			}
		}

		/* ---- SIGNAL 2: View = grid (the wall) ----
		   Opt-in via the Grid button, and only where grid can exist (>=1600, the
		   invite's gate). Everything keys off the one attribute on <html>. The wall
		   spans wide (content + rail + a gap) and the timeline lays out as columns.
		   Off-center left, same as list. Settings placement in grid is a later sub-
		   step - the toolbox stays in the right region for now. */
		@media (width >= 1200px) {
			html[data-view='grid'] .page-wrapper {
				/* the wall MAXIMIZES (1fr, takes as much space as it can); the right
				   rail is only as wide as its buttons (max-content) - just reserved
				   button space, not a big empty gutter. Small left inset. */
				grid-template-columns:
					minmax(1rem, 4vw)
					1fr
					max-content;
			}

			html[data-view='grid'] main,
			html[data-view='grid'] .shell-footer {
				grid-column: 2;
			}

			html[data-view='grid'] .shell-nav {
				grid-column: 3;
			}

			html[data-view='grid'] .timeline {
				display: grid;

				/* real-page approach: cards are 1fr, but the WALL is capped at its
				   max - so cards top out at the lane measure, extra becomes right
				   space. Cleaner than a per-column min. */
				grid-template-columns: repeat(var(--grid-columns), 1fr);
				gap: var(--wall-gap);

				max-width: var(--wall-max);
			}

			/* Intro = lane one: constrain it to one column width so it reads as the
			   first cell of the wall, not a full-width banner. */
			html[data-view='grid'] .page-header {
				max-width: var(--wall-column);
			}

			/* Toolbox becomes a THIN vertical trigger rail in the right region
			   (glyphs stacked), per the notes' "thin rail of triggers only". It
			   sits at the LEFT of the right region - right next to the wall - not
			   shoved to the far screen edge (that was the list rail's flex-end). */
			html[data-view='grid'] .shell-nav {
				align-items: flex-start;
			}

			html[data-view='grid'] .toolbox {
				flex-direction: column;
			}

			/* In grid the panel opens OVER the wall (over-content) and to the LEFT
			   of the toolbox - its right edge meets the toolbox's left edge, so it
			   expands left over the wall rather than dropping below the buttons. The
			   dim returns; it's no longer sized to the rail column. */
			html[data-view='grid'] .panel {
				top: anchor(top);
				right: anchor(left);
				left: auto;
				width: auto;
				max-width: min(360px, 40vw);
				margin: 0 0.5rem 0 0;
			}

			html[data-view='grid'] .panel::backdrop {
				background: rgb(0 0 0 / 0.15);
			}

			/* The Grid invite is the doorbell IN - once in grid it's done its job,
			   so it hides. The way back to list is the Layout control in the panel. */
			html[data-view='grid'] .grid-invite {
				display: none;
			}
		}

		/* ---- EXHIBIT (grid + wide) ----
		   The settings are DISPLAYED inline as a top band sharing the top row with
		   the lane-one intro; the wall spans below. On its own (not a popover) ->
		   no backdrop. JS drops `popover` at this breakpoint so the panel flows into
		   the exhibit slot. */
		/* The band styling applies only while the band is IN VIEW (:not orphaned).
		   Once scrolled past (JS sets data-exhibit-orphaned), all of this drops:
		   the panel reverts to the over-wall popover and the Settings trigger revives
		   on the rail. */
		@media (width >= 1600px) {
			/* reserve the island's column on the right so the wall never grows under
			   the buttons and crowds them out. */
			html[data-view='grid'] .page-wrapper {
				grid-template-columns: minmax(1rem, var(--wall-inset)) 1fr var(--island-reserve);
			}

			/* main uses the WALL's own column template, so the intro, the band, and
			   the cards all share the same grid lines. THIS IS NOT scoped to the
			   orphan state on purpose: the wall's grid must stay identical whether
			   the band is shown or scrolled past, or the wall reflows/changes width
			   as you scroll. Only the PANEL changes with orphan (band <-> popover). */
			html[data-view='grid'] main {
				display: grid;
				grid-template-columns: repeat(var(--grid-columns), 1fr);
				column-gap: var(--wall-gap);
				row-gap: var(--wall-gap);
				max-width: var(--wall-max);
				align-items: start;
			}

			/* intro = the first column; the band takes the rest of the top row. */
			html[data-view='grid'] .page-header {
				grid-column: 1 / 2;
				grid-row: 1;
				max-width: none;
			}

			html[data-view='grid'] .timeline {
				grid-column: 1 / -1;
				grid-row: 2;
			}

			/* The band styling keys off whether the panel is a POPOVER, not the orphan
			   flag: while it's a displayed band (`:not([popover])`) it stays placed at
			   the top row - even after you scroll past it - so it never drops a stray
			   box into the wall. The moment the island turns it into a popover, this
			   drops and the overlay styling takes over. */
			html[data-view='grid'] main > .panel:not([popover]) {
				grid-column: 2 / -1;
				grid-row: 1;
				width: auto;
				max-width: none;
				margin: 0;

				/* seamless: the band blends into the composition, no box/border -
				   the control rows are the only visible chrome. */
				border: none;
				background: transparent;
				padding: 0;

				display: flex;
				flex-wrap: wrap;
				align-items: start;
				gap: 0.75rem;
			}

			html[data-view='grid'] main > .panel:not([popover]) .panel-row {
				margin: 0;
				flex: 1 1 12rem;
			}

			/* in the exhibit the toolbox trigger is never used: the band shows the
			   controls, and the reveal-on-orphan trigger is the fixed island below. */
			html[data-view='grid'] .toolbox [popovertarget='settings'] {
				display: none;
			}

			/* the rail column is empty in the exhibit - hide it so it doesn't leak
			   a strip on the right (the island lives in the margin instead). */
			html[data-view='grid'] .shell-nav {
				display: none;
			}
		}

		/* Next break: 3-column wall on genuinely big monitors (real page uses 1900).
		   Only --grid-columns changes - the wall, wall-max, intro width, and island
		   anchor all derive from it, so the whole layout follows and the island's
		   min() clamp rides the corner once the margin tightens. */
		@media (width >= 1900px) {
			:root {
				--grid-columns: 3;
			}
		}

		/* ---- reveal-on-orphan island ----
		   Matches the real page's .corner-island: fixed in the calm margin just
		   past the wall's right grid line (--island-anchor), clamped back toward the
		   edge when that margin is tight. Always present; visibility flips only when
		   the exhibit band has scrolled away (JS sets data-exhibit-orphaned). */
		.revival-island {
			--island-anchor: calc(
				max(1rem, var(--wall-inset)) + var(--grid-columns) * var(--wall-column)
				+ (var(--grid-columns) - 1) * var(--wall-gap) + var(--wall-gap)
			);

			position: fixed;
			top: 1rem;
			left: min(var(--island-anchor), calc(100vw - var(--island-width) - 1rem));
			z-index: 6;

			/* the revived panel anchors to this */
			anchor-name: --island;

			font: inherit;
			padding: 0.4rem 0.8rem;
			cursor: pointer;

			opacity: 0;
			visibility: hidden;
			transition:
				opacity 200ms ease,
				visibility 200ms;
		}

		html[data-exhibit-orphaned] .revival-island {
			opacity: 1;
			visibility: visible;
		}

		/* In the EXHIBIT the toolbox is display:none, so a popover panel must anchor
		   to the ISLAND - always, not only while scrolled. (Keying this to the scroll
		   state meant that scrolling back up with the popover open reverted it to the
		   hidden --toolbox anchor, which is invalid, so the popover fell back to its
		   static position in the top-left corner.) The island is visibility:hidden,
		   not display:none, so it stays a valid anchor even when unseen.
		   It sits near the right edge, so the panel opens LEFT - its right edge
		   meeting the island's left, expanding over the wall. */
		@media (width >= 1600px) {
			html[data-view='grid'] .panel[popover] {
				position-anchor: --island;
				top: anchor(top);
				right: anchor(left);
				left: auto;
				margin: 0 0.5rem 0 0;
			}
		}

		/* Even bigger: once there's room to the RIGHT of the island, the menu opens
		   into its OWN area (right) instead of over the wall (left) - and own-area
		   means no dim. Room decides Panel-state. Placed AFTER the open-left rule so
		   it wins at this width (equal specificity -> source order). Literal
		   breakpoint because @media can't read the custom-property math. */
		@media (width >= 2400px) {
			html[data-view='grid'] .panel[popover] {
				left: anchor(right);
				right: auto;
				top: anchor(top);
				margin: 0 0 0 0.5rem;
			}

			/* own area - nothing covered, so drop the dim */
			html[data-view='grid'] .panel[popover]::backdrop {
				background: transparent;
			}
		}

		/* the timeline list - reset the <ol> chrome; the layout does the rest.
		   In LIST mode it's a reading column, capped at the content measure so it
		   never stretches wide (grid turns this cap off - there it's the wall). */
		.timeline {
			margin: 0;
			padding: 0;
			list-style: none;

			max-width: var(--content-max);
		}

		/* a fake milestone block so there's something to scroll past */
		.block {
			border: 1px solid #ccc;
			padding: 1rem;
			margin-block: 1rem;
			min-height: 40vh;
		}

		/* ---- the settings panel (a guest) ---- */
		.trigger {
			font: inherit;
			padding: 0.4rem 0.8rem;
			cursor: pointer;
		}

		.panel {
			/* native popover, anchored to the toolbox cluster. Reset the default
			   centering inset so anchor positioning takes over. */
			inset: auto;
			position-anchor: --toolbox;
			top: anchor(bottom);
			right: anchor(right);
			margin: 0.5rem 0 0;

			/* known content earns a floor; capped so it can't overflow a phone */
			min-width: min(var(--panel-min), 100vw - 2rem);

			padding: 1rem;
			border: 1px solid #333;

			/* region tint (debug) */
			background: #fbeef1;

			/* Fallback where anchor positioning is unsupported: top-right corner. */
			@supports not (anchor-name: --x) {
				top: 4rem;
				right: 1rem;
			}
		}

		/* Backdrop = the over-content signal. DEFAULT is NO dim; the dim is added
		   ONLY where the panel actually covers content: narrow (over content) and
		   grid (over the wall, see the grid block). At rail width it opens in its
		   own space, so it stays transparent here - no source-order fragility.
		   Native ::backdrop exists only while the panel is an open popover, so
		   backdrop-presence tracks the overlay state for free. */
		.panel::backdrop {
			background: transparent;
		}

		/* Narrow: panel is over content -> sheer dim (never a blackout, so the live
		   page still shows through). */
		@media (width < 1024px) {
			.panel::backdrop {
				background: rgb(0 0 0 / 0.15);
			}
		}

		/* fake control rows - just blocks with height so the panel has realistic
		   vertical extent (stand-ins for the real control groups). */
		.panel-row {
			margin: 0 0 0.75rem;
			padding: 1.5rem 0.75rem;
			border: 1px solid #ccc;
			background: #fff;
		}

		.panel-row:last-child {
			margin-bottom: 0;
		}
	</style>
</head>

<body>
	<div class='page-wrapper'>
		<!-- role 1: site chrome. Top-level <header> = the banner landmark.
			Holds site nav (later) + the settings trigger. -->
		<header class='shell-nav'>
			<div class='toolbox'>
				<!-- Grid invite: the doorbell to grid mode. Exists ONLY at the grid
					threshold (there's room for the wall), so it's Room-gated in CSS.
					Below it, grid can't exist, so neither can the button. -->
				<button
					type='button'
					class='trigger grid-invite'
					data-toggle-view
				>
					Grid
				</button>

				<button
					type='button'
					class='trigger'
					popovertarget='settings'
				>
					Settings
				</button>
			</div>
		</header>

		<main>
			<!-- role 2: the page-header (per-page intro). A <header> nested in
				<main> is NOT a banner (ARIA excludes it), so it reads correctly as
				this page's introductory content - no landmark clash. -->
			<header class='page-header'>
				<h1>Layout sandbox</h1>

				<p>Bare test bed for the shell switchboard - nav, settings panel, placement across sizes.</p>
			</header>

			<!-- role 3: the settings panel (a guest). Lives in `main` (with the
				intro) so the exhibit can share the top row with it. As a popover it
				escapes to the top layer, so this DOM home doesn't affect the list/
				grid overlay modes; the toolbox still precedes it for anchoring. When
				JS drops `popover` (the exhibit enhancement) it flows here inline. -->
			<div
				id='settings'
				popover
				class='panel'
				aria-label='Display settings'
			>
				<!-- Layout control: the way BACK to list lives here, inside the
					panel, once you're in grid (the toolbox Grid button is only the
					invite IN). -->
				<p class='panel-row'>
					<button
						type='button'
						data-toggle-view
					>
						Layout: List / Grid
					</button>
				</p>

				<!-- fake control rows, just to give the panel realistic height so it
					reads as the tall over-wall panel (real controls fill this down). -->
				<p class='panel-row'>Color scheme</p>

				<p class='panel-row'>Brand</p>

				<p class='panel-row'>Emphasis</p>

				<p class='panel-row'>Sound</p>

				<p class='panel-row'>Filter</p>
			</div>

			<!-- the timeline: reverse-chron <ol> of milestones, matching the real
				structure (grid lane-dealer keys off `.timeline > li`). -->
			<ol class='timeline'>
				<li class='block'>content 1</li>

				<li class='block'>content 2</li>

				<li class='block'>content 3</li>

				<li class='block'>content 4</li>

				<li class='block'>content 5</li>

				<li class='block'>content 6</li>

				<li class='block'>content 7</li>

				<li class='block'>content 8</li>
			</ol>
		</main>

		<footer class='shell-footer'>
			<p>footer</p>
		</footer>

		<!-- reveal-on-orphan trigger (the real page's "corner island"): ALWAYS in
			the DOM, fixed in the margin just past the wall's right grid line,
			visibility hidden until the exhibit band scrolls away. -->
		<button
			type='button'
			class='revival-island'
			aria-label='Display settings'
		>
			Settings
		</button>
	</div>

	<script>
		// SIGNAL 2: View. Grid mode is opt-in - the Grid button toggles data-view
		// on <html>, and every grid rule keys off that one attribute. This is the
		// first JS; list mode needed none. If it never runs, the site is list mode.
		var root = document.documentElement;
		var panel = document.getElementById('settings');
		var pageHeader = document.querySelector('.page-header');
		var island = document.querySelector('.revival-island');
		var exhibit = window.matchMedia('(min-width: 1600px)');

		// Is the top band (the intro/exhibit row) still in view? Only the island's
		// visibility keys off this - NOT the panel's flow state (see below).
		var bandVisible = true;

		function inExhibit() {
			return root.getAttribute('data-view') === 'grid' && exhibit.matches;
		}

		// The panel is a popover everywhere EXCEPT the exhibit, where it's the
		// displayed band. CRUCIAL: in the exhibit the band stays in flow on scroll -
		// it never toggles to a popover as you scroll. (It used to, which reflowed
		// `main` every scroll tick and fought the observer = jitter.) Scroll only
		// flips data-exhibit-orphaned, which drives the fixed island's visibility -
		// a fixed element, so no reflow. The band becomes a popover only on an
		// island CLICK (below), a one-off, never scroll-driven.
		function updatePanelMode() {
			if (inExhibit()) {
				// Scrolled back to the top: the persistent band is the control surface
				// again, so close any island popover first - otherwise the node stays
				// a popover and the band never comes back (the filters "vanish").
				if (bandVisible && panel.matches(':popover-open')) {
					panel.hidePopover();
				}

				if (!panel.matches(':popover-open')) {
					panel.removeAttribute('popover');
				}
			} else if (!panel.hasAttribute('popover')) {
				panel.setAttribute('popover', '');
			}

			root.toggleAttribute('data-exhibit-orphaned', inExhibit() && !bandVisible);
		}

		// The island (visible once orphaned) pops the SAME panel where the reader
		// is: make it a popover just for that, hand it back to the band on close.
		island.addEventListener('click', function () {
			if (!panel.hasAttribute('popover')) {
				panel.setAttribute('popover', '');
			}
			panel.showPopover();
		});

		panel.addEventListener('toggle', function (event) {
			if (event.newState === 'closed' && inExhibit()) {
				panel.removeAttribute('popover');
			}
		});

		// Watch the top row leave/enter; flip the orphan state as it crosses.
		var bandObserver = new IntersectionObserver(function (entries) {
			bandVisible = entries[0].isIntersecting;
			updatePanelMode();
		});
		bandObserver.observe(pageHeader);

		// Any [data-toggle-view] flips the view: the toolbox Grid invite (list ->
		// grid) and the Layout control inside the panel (grid -> list) both use it.
		document.querySelectorAll('[data-toggle-view]').forEach(function (button) {
			button.addEventListener('click', function () {
				if (root.getAttribute('data-view') === 'grid') {
					root.removeAttribute('data-view');
				} else {
					root.setAttribute('data-view', 'grid');
				}

				updatePanelMode();
			});
		});

		exhibit.addEventListener('change', updatePanelMode);
		updatePanelMode();
	</script>

</body>
</html>
